spring:
  application:
    name: roomreservationapi


  # Conexão com o banco de dados
  # Variáveis de ambiente : ${NOME_VARIAVEL}
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      enabled: false

server:
  port: 8080